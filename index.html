<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Seekers Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #ffffff; color: #222; font-family: 'Georgia', serif; }
        .gold-text { color: #b8860b; }
        .gold-bg { background-color: #b8860b; }
        .card { border: 1px solid #f0f0f0; transition: 0.3s; }
        .card:hover { border-color: #b8860b; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* Floating WhatsApp Icon */
        .whatsapp-float {
            position: fixed; bottom: 30px; right: 30px;
            background: #25d366; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Detail Pop-up (Modal) Logic */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; width: 90%; max-width: 500px; border-radius: 10px; position: relative; }
    </style>
</head>
<body>

    <a href="https://wa.me/YOUR_NUMBER" class="whatsapp-float">
        <i class="fab fa-whatsapp"></i>
    </a>

    <nav class="p-8 flex justify-between items-center border-b border-gray-50 bg-white">
        <h1 class="text-2xl font-bold tracking-tighter gold-text italic">ADVENTURE SEEKERS</h1>
        <p class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Europe • UK • USA</p>
    </nav>

    <header class="py-20 text-center px-6">
        <h2 class="text-5xl font-light mb-4">Elite <span class="italic gold-text">Residential</span> Portfolio</h2>
        <div class="h-1 w-20 gold-bg mx-auto mb-6"></div>
        <p class="text-gray-500 uppercase tracking-[0.2em] text-[10px]">1, 2, & 3 Bedroom Luxury Options</p>
    </header>

    <section class="max-w-6xl mx-auto px-6 pb-24 grid grid-cols-1 md:grid-cols-3 gap-12">
        
        <div class="card p-4 rounded-xl">
            <div class="h-48 bg-gray-100 mb-6 flex items-center justify-center text-gray-300 italic">Exterior Image</div>
            <p class="gold-text text-[10px] font-bold uppercase mb-2">France</p>
            <h3 class="text-xl font-bold mb-4">Parisian Executive</h3>
            <button onclick="showDetails('1 Bed', '1 Kitchen', '1 Toilet', '€2,100/mo')" class="w-full py-3 border border-black text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition">See Options</button>
        </div>

        <div class="card p-4 rounded-xl">
            <div class="h-48 bg-gray-100 mb-6 flex items-center justify-center text-gray-300 italic">Exterior Image</div>
            <p class="gold-text text-[10px] font-bold uppercase mb-2">Italy</p>
            <h3 class="text-xl font-bold mb-4">Tuscan Sun Suite</h3>
            <button onclick="showDetails('2 Beds', 'Full Kitchen', '2 Toilets', '€3,500/mo')" class="w-full py-3 border border-black text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition">See Options</button>
        </div>

        <div class="card p-4 rounded-xl">
            <div class="h-48 bg-gray-100 mb-6 flex items-center justify-center text-gray-300 italic">Exterior Image</div>
            <p class="gold-text text-[10px] font-bold uppercase mb-2">Greece</p>
            <h3 class="text-xl font-bold mb-4">Santorini Grand</h3>
            <button onclick="showDetails('3 Beds', 'Chef Kitchen', '3 Toilets', '€5,200/mo')" class="w-full py-3 border border-black text-[10px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition">See Options</button>
        </div>

    </section>

    <div id="detailModal" class="modal">
        <div class="modal-content text-center">
            <h3 class="text-2xl font-bold mb-6 gold-text">Property Details</h3>
            <div class="space-y-4 text-gray-600 mb-8">
                <p id="m-bed" class="border-b pb-2"></p>
                <p id="m-kitchen" class="border-b pb-2"></p>
                <p id="m-toilet" class="border-b pb-2"></p>
                <p id="m-price" class="text-xl font-bold text-black"></p>
            </div>
            <button onclick="closeDetails()" class="text-xs uppercase underline tracking-widest">Close</button>
        </div>
    </div>

    <script>
        function showDetails(bed, kitchen, toilet, price) {
            document.getElementById('m-bed').innerHTML = '<i class="fa fa-bed mr-2"></i> ' + bed;
            document.getElementById('m-kitchen').innerHTML = '<i class="fa fa-utensils mr-2"></i> ' + kitchen;
            document.getElementById('m-toilet').innerHTML = '<i class="fa fa-toilet mr-2"></i> ' + toilet;
            document.getElementById('m-price').innerText = price;
            document.getElementById('detailModal').style.display = "block";
        }
        function closeDetails() {
            document.getElementById('detailModal').style.display = "none";
        }
    </script>

</body>
</html>
